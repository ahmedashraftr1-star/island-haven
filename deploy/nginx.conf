# Nginx as the load balancer + edge cache in front of the api instances.
# Pairs with the app's Cache-Control (Tier 1) — see CACHING.md. This config is
# the "CDN-lite" Tier 2 you can run yourself; a real CDN (Cloudflare/Fastly)
# follows the same rules.

worker_processes auto;
events { worker_connections 4096; }

http {
  # Compress text assets on the wire (JS/CSS/HTML/JSON/SVG/fonts) — cuts the
  # first-load transfer ~70% (e.g. a 320 KB CSS bundle ships as ~40 KB). This is
  # the single biggest first-visit speedup; hashed assets are still cached 1y.
  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain text/css text/xml
    application/json application/javascript application/xml+rss
    text/javascript image/svg+xml application/wasm
    font/ttf font/otf application/vnd.ms-fontobject;

  # Round-robin over the api instances, with fast failover for zero-downtime
  # deploys (matches the behaviour proven in deploy/local-cluster).
  upstream api {
    server api1:3001 max_fails=1 fail_timeout=2s;
    server api2:3001 max_fails=1 fail_timeout=2s;
    keepalive 32;
  }

  # Micro edge cache for anonymous public GETs. Honors the app's Cache-Control.
  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=edge:32m max_size=512m
                   inactive=120s use_temp_path=off;

  # Treat a request as "anonymous" only when it carries NO session — same gate
  # as the app's PUBLIC_CACHE_RE. Any of these present ⇒ bypass the edge cache.
  map $http_authorization $has_auth { default 1; "" 0; }
  map $cookie_ih_user     $has_user { default 1; "" 0; }
  map $cookie_ih_admin    $has_admin { default 1; "" 0; }

  server {
    listen 80;
    server_name _;

    # Never edge-cache personalized or admin paths.
    location ~ ^/api/(me|admin)/ {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_next_upstream error timeout http_502 http_503;
    }

    location /api/ {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Zero-downtime: on a backend going away, retry the other.
      proxy_next_upstream error timeout http_502 http_503;
      proxy_connect_timeout 2s;

      # Edge cache only anonymous GETs; respect the app's Cache-Control.
      proxy_cache edge;
      proxy_cache_methods GET HEAD;
      proxy_cache_bypass $has_auth$has_user$has_admin;
      proxy_no_cache     $has_auth$has_user$has_admin;
      proxy_cache_valid 200 60s;
      proxy_cache_use_stale error timeout updating http_502 http_503;
      proxy_cache_background_update on;
      add_header X-Edge-Cache $upstream_cache_status;
    }

    # Static frontend (if served here) — long-cache hashed assets.
    location / {
      root /usr/share/nginx/html;
      try_files $uri /index.html;
      location ~* \.(js|css|woff2|png|jpg|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }
    }
  }
}
