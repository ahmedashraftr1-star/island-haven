# Production-shaped local/staging stack: Nginx LB → 2× api (producers) + 1 worker
# (consumer) → Redis + PgBouncer → Postgres. Mirrors the topology proven in
# deploy/local-cluster (which needs no Docker). See SCALING.md.
#
#   docker compose -f deploy/docker-compose.yml up --build
#
# Secrets come from a .env file next to this compose file — never commit real
# secrets. Required: SESSION_SECRET, ADMIN_PASSWORD, POSTGRES_PASSWORD,
# (optional) RESEND_API_KEY, EMAIL_FROM.

# Shared env for the api instances + worker (top-level extension anchor).
x-app-env: &app-env
  NODE_ENV: production
  DATABASE_URL: postgres://ih:${POSTGRES_PASSWORD}@pgbouncer:5432/ih_haven
  REDIS_URL: redis://redis:6379
  SESSION_SECRET: ${SESSION_SECRET}
  ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD}
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  EMAIL_FROM: ${EMAIL_FROM:-}

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes: ["redis-data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ih_haven
      POSTGRES_USER: ih
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./postgres-tuning.sql:/docker-entrypoint-initdb.d/10-tuning.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ih -d ih_haven"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: postgres
      DB_NAME: ih_haven
      DB_USER: ih
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "25"
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  api1:
    build: { context: .., dockerfile: deploy/Dockerfile }
    environment:
      <<: *app-env
      PORT: "3001"
    depends_on:
      redis: { condition: service_healthy }
      pgbouncer: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api2:
    build: { context: .., dockerfile: deploy/Dockerfile }
    environment:
      <<: *app-env
      PORT: "3001"
    depends_on:
      redis: { condition: service_healthy }
      pgbouncer: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build: { context: .., dockerfile: deploy/Dockerfile }
    command: ["node", "--enable-source-maps", "dist/worker.mjs"]
    environment:
      <<: *app-env
      # Register the daily digest from the worker side (repeatable singleton).
      ENABLE_DAILY_DIGEST_CRON: "1"
    depends_on:
      redis: { condition: service_healthy }
      pgbouncer: { condition: service_started }
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports: ["8080:80"]
    depends_on: [api1, api2]
    restart: unless-stopped

volumes:
  redis-data:
  pg-data:
