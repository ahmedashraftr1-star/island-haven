# Island Haven — dedicated nginx server block (co-tenant on the NasToNas VPS).
# Responds ONLY to its own domains (NOT default_server), reverse-proxies to the
# Node process on 127.0.0.1:3020, which serves BOTH the SPA and /api same-origin.
# Isolation: distinct server_name → nginx never routes NasToNas traffic here, and
# NasToNas's block is not referenced or altered. certbot --nginx will add the
# :443 server + the http→https redirect for these two names only.
#
# Install: /etc/nginx/sites-available/islandhavengsza.com  → symlink into sites-enabled
# Then:    sudo nginx -t && sudo systemctl reload nginx     (reload, never restart)

server {
    listen 80;
    listen [::]:80;
    server_name islandhavengsza.com www.islandhavengsza.com;   # its own names only

    # Uploads (letters/images) — match the app's body limits; keep modest.
    client_max_body_size 12m;

    # Single upstream: Node serves SPA + /api on 3020 (same origin).
    location / {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Fail fast rather than hang if the app is momentarily restarting.
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_next_upstream   error timeout http_502 http_503;
    }

    # Liveness passthrough (handy for external uptime checks).
    location = /api/healthz {
        proxy_pass http://127.0.0.1:3020/api/healthz;
        access_log off;
    }
}
