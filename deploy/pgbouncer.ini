; PgBouncer — connection pooler in front of Postgres. With N api instances + a
; worker each holding a small pool, the raw connection count can blow past
; Postgres max_connections; PgBouncer multiplexes them onto a few real ones.
; (In docker-compose.yml the edoburu/pgbouncer image is configured via env; this
; file is the reference for a bare-metal / systemd install.)

[databases]
ih_haven = host=127.0.0.1 port=5432 dbname=ih_haven

[pgbouncer]
listen_addr = 127.0.0.1
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; transaction pooling = the right mode for short web/worker queries. NOTE: it
; disallows session-level features (LISTEN/NOTIFY, session GUCs, prepared stmts
; that span txns). drizzle's queries are per-statement, so this is safe here.
pool_mode = transaction

; Sizing: keep (default_pool_size × active DBs) well under Postgres
; max_connections, leaving headroom for admin + the worker's own direct pool.
max_client_conn = 1000
default_pool_size = 25
reserve_pool_size = 5
reserve_pool_timeout = 3

server_idle_timeout = 60
server_lifetime = 3600
log_connections = 0
log_disconnections = 0

; App side: point DATABASE_URL at PgBouncer, e.g.
;   postgres://ih:***@127.0.0.1:6432/ih_haven
; and cap the app pool (DB_POOL_MAX) low, since PgBouncer does the real pooling.
