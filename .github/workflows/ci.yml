name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (all packages)
        run: pnpm run typecheck

      - name: Build (web + backend)
        run: pnpm -r --filter "./artifacts/**" --if-present run build

  api-tests:
    name: API integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ih_haven_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ih_haven_test
      ADMIN_USERNAME: ci_admin
      ADMIN_PASSWORD: ci_admin_password_change_me
      SESSION_SECRET: ci_session_secret_change_me
      NODE_ENV: test
      PORT: "3001"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Push DB schema
        run: pnpm --filter @workspace/db run push

      - name: Seed demo data
        working-directory: artifacts/api-server
        run: |
          node ./build.mjs
          node --enable-source-maps ./dist/index.mjs &
          SERVER_PID=$!
          # wait for readiness
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/readyz && break || sleep 1
          done
          ADMIN_USERNAME=$ADMIN_USERNAME ADMIN_PASSWORD=$ADMIN_PASSWORD node scripts/seed-incubator.mjs || true
          ADMIN_USERNAME=$ADMIN_USERNAME ADMIN_PASSWORD=$ADMIN_PASSWORD node scripts/seed-community.mjs || true
          ADMIN_USERNAME=$ADMIN_USERNAME ADMIN_PASSWORD=$ADMIN_PASSWORD node scripts/seed-extras.mjs || true

      - name: Run API integration tests
        working-directory: artifacts/api-server
        run: TEST_ADMIN_USER=$ADMIN_USERNAME TEST_ADMIN_PASS=$ADMIN_PASSWORD pnpm test
