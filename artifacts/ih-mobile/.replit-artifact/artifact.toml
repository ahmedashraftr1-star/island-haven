kind = "mobile"
previewPath = "/mobile/"
title = "آيلاند هيفن"
version = "1.0.0"
id = "artifacts/ih-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 20244

[services.development]
run = "pnpm --filter @workspace/ih-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ih-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ih-mobile", "run", "serve" ]

[services.env]
PORT = "20244"
BASE_PATH = "/mobile/"
