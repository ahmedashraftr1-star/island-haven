    <!-- Performance: hero LCP preload, font preconnect (+ dns-prefetch fallback) -->
    <!-- The hero still is now responsive, so the preload MUST offer the same
         candidates — otherwise the browser preloads the 1350w original while the
         <img> picks the 960w, and we pay for both. -->
    <!-- AVIF preload (type-gated): AVIF-capable browsers (~95%) preload the exact
         format the hero <picture> renders; the rest ignore this and fetch the WebP
         fallback from the <img> srcset. One preload only — never a double-fetch. -->
    <link rel="preload" as="image" href="%BASE_URL%photos/IMG_8341.avif"
          imagesrcset="%BASE_URL%photos/IMG_8341-640.avif 640w, %BASE_URL%photos/IMG_8341-960.avif 960w, %BASE_URL%photos/IMG_8341.avif 1350w"
          imagesizes="100vw" type="image/avif" fetchpriority="high" />
    <!-- Fonts are SELF-HOSTED (src/fonts.css, bundled into the app stylesheet).
         The old setup cost every visitor two extra origins before a single glyph
         byte moved: a RENDER-BLOCKING stylesheet from fonts.googleapis.com, then
         the files from fonts.gstatic.com — DNS + TLS ×2. On a high-latency Gaza
         mobile link that dominated the critical path. Now: same origin, same
         already-open connection, cached immutable for a year.
         These two faces carry the first Arabic text painted, so warm them early
         (the rest stream in on demand via unicode-range). -->
    <link rel="preload" as="font" type="font/woff2" crossorigin
          href="%BASE_URL%fonts/ibm-plex-sans-arabic-arabic-Qw3CZRtWPQCuHme67tEYUIx3Kh0PHR9N6Ys43PW5fslBEg0.woff2">
    <link rel="preload" as="font" type="font/woff2" crossorigin
          href="%BASE_URL%fonts/ibm-plex-sans-arabic-arabic-Qw3NZRtWPQCuHme67tEYUIx3Kh0PHR9N6YPi-OCRXMRrKATtYV0.woff2">
